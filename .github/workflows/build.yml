name: Build and test

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [ "main" ]

env:
  COMPILER_IMAGE_PATH: /tmp/compiler-image.tar

jobs:
  compiler-docker-image:
    runs-on: ubuntu-latest
    env:
      DOCKER_TAG: libnjkafka:gha

    steps:
    - uses: actions/checkout@v6

    - name: Check Docker image cache
      uses: actions/cache@v5
      id: compiler-image
      with:
        path: ${{ env.COMPILER_IMAGE_PATH }}
        key: compiler-image-${{ hashFiles('Dockerfile') }}
        lookup-only: true

    - name: Build Docker image
      if: steps.compiler-image.outputs.cache-hit != 'true'
      run: |
        docker build \
          --build-arg ARCHITECTURE=x64 \
          --tag ${{ env.DOCKER_TAG }} \
          .
        docker save ${{ env.DOCKER_TAG }} --output ${{ env.COMPILER_IMAGE_PATH }}

    - name: Save Docker image
      if: steps.compiler-image.outputs.cache-hit != 'true'
      uses: actions/cache/save@v5
      with:
        path: ${{ env.COMPILER_IMAGE_PATH }}
        key: compiler-image-${{ hashFiles('Dockerfile') }}

  compile:
    runs-on: ubuntu-latest
    needs:
      - compiler-docker-image
    env:
      DOCKER_TAG: libnjkafka:gha
      KAFKA_TOPIC: kafka-build-topic
      KAFKA_BROKERS: localhost:9092

    services:
      broker:
        image: apache/kafka-native:3.9.2
        ports:
          - 9092:9092
        env:
          KAFKA_NODE_ID: 1
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
          KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT_HOST://localhost:9092,PLAINTEXT://broker:19092'
          KAFKA_PROCESS_ROLES: 'broker,controller'
          KAFKA_CONTROLLER_QUORUM_VOTERS: '1@broker:29093'
          KAFKA_LISTENERS: 'CONTROLLER://:29093,PLAINTEXT_HOST://:9092,PLAINTEXT://:19092'
          KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
          KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
          CLUSTER_ID: '4L6g3nShT-eMCtK--X86sw'
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
          KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
          KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
          KAFKA_SHARE_COORDINATOR_STATE_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_SHARE_COORDINATOR_STATE_TOPIC_MIN_ISR: 1
          KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Reset mtimes
      uses: chetan/git-restore-mtime-action@v2

    - name: Restore the build directory
      uses: actions/cache/restore@v5
      id: native-binaries-cache
      with:
        key: build-dir-${{ github.ref_name }}
        restore-keys: |
          build-dir-main
        path: build/

    - name: Restore compiler Docker image from cache
      uses: actions/cache/restore@v5
      with:
        path: ${{ env.COMPILER_IMAGE_PATH }}
        key: compiler-image-${{ hashFiles('Dockerfile') }}
        fail-on-cache-miss: true

    - name: Load Docker image
      run: docker load --input ${{ env.COMPILER_IMAGE_PATH }}

    - name: Build the library
      if: steps.native-binaries-cache.outputs.cache-hit != 'true'
      run: |
        docker run --network=host \
          --volume ${{ github.workspace }}:/libnjkafka \
          --env KAFKA_BROKERS=${{ env.KAFKA_BROKERS }} \
          --env KAFKA_TOPIC=${{ env.KAFKA_TOPIC }} \
          ${{ env.DOCKER_TAG }} \
          make

    - name: Run the C test program
      run: |
        docker run --network=host \
          --platform=linux/amd64 \
          --volume ${{ github.workspace }}:/libnjkafka \
          --env KAFKA_BROKERS=${{ env.KAFKA_BROKERS }} \
          --env KAFKA_TOPIC=${{ env.KAFKA_TOPIC }} \
          ${{ env.DOCKER_TAG }} \
          make c-demo

    - name: Upload build artifacts
      uses: actions/upload-artifact@v6
      with:
        name: build-dir
        path: build/

    - name: Save build directory to the cache
      if: steps.native-binaries-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v5
      with:
        path: build/
        key: build-dir-${{ github.ref_name }}

  ruby-c-extension:
      runs-on: ubuntu-latest
      needs:
        - compile
      env:
        DOCKER_TAG: libnjkafka-ruby:gha
        RUBY_IMAGE_PATH: /tmp/ruby-image.tar
        KAFKA_TOPIC: kafka-build-topic
        KAFKA_BROKERS: localhost:9092

      services:
        broker:
          image: apache/kafka-native:3.9.2
          ports:
            - 9092:9092
          env:
            KAFKA_NODE_ID: 1
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
            KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT_HOST://localhost:9092,PLAINTEXT://broker:19092'
            KAFKA_PROCESS_ROLES: 'broker,controller'
            KAFKA_CONTROLLER_QUORUM_VOTERS: '1@broker:29093'
            KAFKA_LISTENERS: 'CONTROLLER://:29093,PLAINTEXT_HOST://:9092,PLAINTEXT://:19092'
            KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
            KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
            CLUSTER_ID: '4L6g3nShT-eMCtK--X86sw'
            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
            KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
            KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
            KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
            KAFKA_SHARE_COORDINATOR_STATE_TOPIC_REPLICATION_FACTOR: 1
            KAFKA_SHARE_COORDINATOR_STATE_TOPIC_MIN_ISR: 1
            KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'

      steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: build-dir
          path: ./build

      - name: Show artifacts
        run: ls -l build

      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ env.DOCKER_TAG }} \
            --file Dockerfile.ruby \
            .

      - name: Compile the Ruby C extension and run the Ruby tests
        run: |
          docker run --network=host \
            --volume ${{ github.workspace }}:/libnjkafka \
            --env KAFKA_BROKERS=${{ env.KAFKA_BROKERS }} \
            --env KAFKA_TOPIC=${{ env.KAFKA_TOPIC }} \
            ${{ env.DOCKER_TAG }} \
            make ruby-c-ext

  linux-binaries:
    needs: compile
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [linux/amd64, linux/arm64]

    env:
      DOCKER_TAG: libnjkafka:gha
      KAFKA_TOPIC: kafka-build-topic
      KAFKA_BROKERS: localhost:9092
      DOCKER_PLATFORM: ${{ matrix.platform }}
    
    services:
      broker:
        image: apache/kafka-native:3.9.2
        ports:
          - 9092:9092
        env:
          KAFKA_NODE_ID: 1
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
          KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT_HOST://localhost:9092,PLAINTEXT://broker:19092'
          KAFKA_PROCESS_ROLES: 'broker,controller'
          KAFKA_CONTROLLER_QUORUM_VOTERS: '1@broker:29093'
          KAFKA_LISTENERS: 'CONTROLLER://:29093,PLAINTEXT_HOST://:9092,PLAINTEXT://:19092'
          KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
          KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
          CLUSTER_ID: '4L6g3nShT-eMCtK--X86sw'
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
          KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
          KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
          KAFKA_SHARE_COORDINATOR_STATE_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_SHARE_COORDINATOR_STATE_TOPIC_MIN_ISR: 1
          KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Reset mtimes
      uses: chetan/git-restore-mtime-action@v2

    - name: Build the container
      run:
        DOCKER_PLATFORM=${{ env.DOCKER_PLATFORM }} make docker-build

    - name: Build the library
      run:
        DOCKER_PLATFORM=${{ env.DOCKER_PLATFORM }} make docker-make

  compile-macos-arm64:
    runs-on: macos-latest
    needs: compile
    env:
      KAFKA_TOPIC: kafka-build-topic
      KAFKA_BROKERS: localhost:9092

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Reset mtimes
      uses: chetan/git-restore-mtime-action@v2

    - name: Install dependencies
      run: |
        brew install openssl zlib 

    - name: Download GraalVM
      run: |
        ARCHITECTURE=aarch64
        JDK_VERSION=25
        GRAALVM_ARCHIVE=graalvm-jdk-${JDK_VERSION}_macos-${ARCHITECTURE}_bin.tar.gz
        curl -s -L -o ${GRAALVM_ARCHIVE} https://download.oracle.com/graalvm/${JDK_VERSION}/latest/${GRAALVM_ARCHIVE}
        tar -xzf ${GRAALVM_ARCHIVE}
        rm ${GRAALVM_ARCHIVE}
        mv graalvm-jdk-${JDK_VERSION}* graalvm
        echo "GRAALVM_HOME=$PWD/graalvm" >> $GITHUB_ENV
        echo "PATH=$PWD/graalvm/bin:\$$PATH" >> $GITHUB_ENV

    - name: Download Kafka lib
      run: |
        KAFKA_ARCHIVE=kafka_2.13-3.9.2.tgz
        curl -s -L -o ${KAFKA_ARCHIVE} https://downloads.apache.org/kafka/3.9.2/${KAFKA_ARCHIVE}
        tar -xzf ${KAFKA_ARCHIVE}
        rm ${KAFKA_ARCHIVE}
        mv kafka_2.13-3.9.2 kafka

    - name: Build the library
      run: make

    - name: Upload build artifacts
      uses: actions/upload-artifact@v6
      with:
        name: build-mdir-macos-arm64
        path: build/Darwin-arm64/
