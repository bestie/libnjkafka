name: Build and test

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [ "main" ]

env:
  BROKER_IMAGE_PATH: /tmp/broker-images.tar

jobs:

  broker-docker-images:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Check Docker image cache
      uses: actions/cache@v5
      id: broker-images
      with:
        path: ${{ env.BROKER_IMAGE_PATH }}
        key: broker-images-${{ hashFiles('docker-compose.yml') }}
        lookup-only: true

    - name: Pull and save images
      if: steps.broker-images.outputs.cache-hit != 'true'
      run: |
        docker compose pull --quiet
        docker save $(docker compose config --images) --output ${{ env.BROKER_IMAGE_PATH }}

    - name: Save images to cache
      if: steps.broker-images.outputs.cache-hit != 'true'
      uses: actions/cache/save@v5
      with:
        path: ${{ env.BROKER_IMAGE_PATH }}
        key: broker-images-${{ hashFiles('docker-compose.yml') }}

  compile:
    runs-on: ubuntu-latest
    needs:
      - broker-docker-images
    env:
      DOCKER_TAG: libnjkafka:gha
      KAFKA_TOPIC: kafka-build-topic
      KAFKA_BROKERS: localhost:9092

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Reset mtimes
      uses: chetan/git-restore-mtime-action@v2

    - name: Restore the build directory
      uses: actions/cache/restore@v5
      id: native-binaries-cache
      with:
        key: build-dir-${{ github.ref_name }}
        restore-keys: |
          build-dir-main
        path: build/

    - name: Restore broker images from cache
      uses: actions/cache/restore@v5
      with:
        path: ${{ env.BROKER_IMAGE_PATH }}
        key: broker-images-${{ hashFiles('docker-compose.yml') }}
        fail-on-cache-miss: true

    - name: Start broker
      run: |
        docker load --input ${{ env.BROKER_IMAGE_PATH }}
        docker compose up --detach

    - uses: docker/setup-buildx-action@v3

    - uses: docker/build-push-action@v5
      with:
        context: .
        tags: libnjkafka:gha
        load: true
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          ARCHITECTURE=x64

    - name: Ensure the broker is up
      run: docker compose exec --no-TTY broker sh -c 'cub kafka-ready -b localhost:9092 1 30'

    - name: Build the library
      if: steps.native-binaries-cache.outputs.cache-hit != 'true'
      run: |
        docker run --network=host \
          --platform=linux/amd64 \
          --volume ${{ github.workspace }}:/libnjkafka \
          --env KAFKA_BROKERS=${{ env.KAFKA_BROKERS }} \
          --env KAFKA_TOPIC=${{ env.KAFKA_TOPIC }} \
          ${{ env.DOCKER_TAG }} \
          make

    - name: Run the C test program
      run: |
        docker run --network=host \
          --platform=linux/amd64 \
          --volume ${{ github.workspace }}:/libnjkafka \
          --env KAFKA_BROKERS=${{ env.KAFKA_BROKERS }} \
          --env KAFKA_TOPIC=${{ env.KAFKA_TOPIC }} \
          ${{ env.DOCKER_TAG }} \
          make c-demo

    - name: Upload build artifacts
      uses: actions/upload-artifact@v6
      with:
        name: build-dir
        path: build/

    - name: Save build directory to the cache
      if: steps.native-binaries-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v5
      with:
        path: build/
        key: build-dir-${{ github.ref_name }}

  ruby-c-extension:
      runs-on: ubuntu-latest
      needs:
        - compile
        - broker-docker-images
      env:
        DOCKER_TAG: libnjkafka-ruby:gha
        RUBY_IMAGE_PATH: /tmp/ruby-image.tar

      steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: build-dir
          path: ./build

      - name: Show artifacts
        run: ls -l build

      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ env.DOCKER_TAG }} \
            --file Dockerfile.ruby \
            .

      - name: Compile the Ruby C extension and run the Ruby tests
        run: |
          docker run --network=host \
            --volume ${{ github.workspace }}:/libnjkafka \
            --env KAFKA_BROKERS=${{ env.KAFKA_BROKERS }} \
            --env KAFKA_TOPIC=${{ env.KAFKA_TOPIC }} \
            ${{ env.DOCKER_TAG }} \
            make ruby-c-ext
