name: Build and test

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [ "main" ]

env:
  COMPILER_IMAGE_PATH: /tmp/compiler-image.tar
  BROKER_IMAGE_PATH: /tmp/broker-image.tar

jobs:
  compiler-docker-image:
    runs-on: ubuntu-latest
    env:
      DOCKER_TAG: libnjkafka:gha

    steps:
    - uses: actions/checkout@v6

    - name: Check Docker image cache
      uses: actions/cache@v5
      id: compiler-image
      with:
        path: ${{ env.COMPILER_IMAGE_PATH }}
        key: compiler-image-${{ hashFiles('Dockerfile') }}
        lookup-only: true

    - name: Build Docker image
      if: steps.compiler-image.outputs.cache-hit != 'true'
      run: |
        docker build \
          --build-arg ARCHITECTURE=x64 \
          --tag ${{ env.DOCKER_TAG }} \
          .
        docker save ${{ env.DOCKER_TAG }} --output ${{ env.COMPILER_IMAGE_PATH }}

    - name: Save Docker image
      if: steps.compiler-image.outputs.cache-hit != 'true'
      uses: actions/cache/save@v5
      with:
        path: ${{ env.COMPILER_IMAGE_PATH }}
        key: compiler-image-${{ hashFiles('Dockerfile') }}

  broker-docker-image:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Check Docker image cache
      uses: actions/cache@v5
      id: broker-image
      with:
        path: ${{ env.BROKER_IMAGE_PATH }}
        key: broker-image-${{ hashFiles('docker-compose.yml') }}
        lookup-only: true

    - name: Pull image
      if: steps.broker-image.ouputs.cache-hit != 'true'
      run: |
        docker compose pull --quiet
        docker save $(docker compose config --images) --output ${{ env.BROKER_IMAGE_PATH }}

    - name: Save image to cache
      if: steps.broker-image.outputs.cache-hit != 'true'
      uses: actions/cache/save@v5
      with:
        path: ${{ env.BROKER_IMAGE_PATH }}
        key: broker-image-${{ hashFiles('docker-compose.yml') }}

  compile:
    runs-on: ubuntu-latest
    needs:
      - compiler-docker-image
      - broker-docker-image
    env:
      DOCKER_TAG: libnjkafka:gha
      KAFKA_TOPIC: kafka-build-topic
      KAFKA_BROKERS: localhost:9092

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Reset mtimes
      uses: chetan/git-restore-mtime-action@v2

    - name: Restore the build directory
      uses: actions/cache/restore@v5
      id: native-binaries-cache
      with:
        key: build-dir-${{ github.ref_name }}
        restore-keys: |
          build-dir-main
        path: build/

    - name: Restore broker image from cache
      uses: actions/cache/restore@v5
      with:
        path: ${{ env.BROKER_IMAGE_PATH }}
        key: broker-image-${{ hashFiles('docker-compose.yml') }}
        fail-on-cache-miss: true

    - name: Start broker
      run: |
        docker load --input ${{ env.BROKER_IMAGE_PATH }}
        docker compose up --detach

    - name: Restore compiler Docker image from cache
      uses: actions/cache/restore@v5
      with:
        path: ${{ env.COMPILER_IMAGE_PATH }}
        key: compiler-image-${{ hashFiles('Dockerfile') }}
        fail-on-cache-miss: true

    - name: Load Docker image
      run: docker load --input ${{ env.COMPILER_IMAGE_PATH }}

    - name: Build the library
      if: steps.native-binaries-cache.outputs.cache-hit != 'true'
      run: |
        docker run --network=host \
          --volume ${{ github.workspace }}:/libnjkafka \
          --env KAFKA_BROKERS=${{ env.KAFKA_BROKERS }} \
          --env KAFKA_TOPIC=${{ env.KAFKA_TOPIC }} \
          ${{ env.DOCKER_TAG }} \
          make

    - name: Run the C test program
      run: |
        docker run --network=host \
          --platform=linux/amd64 \
          --volume ${{ github.workspace }}:/libnjkafka \
          --env KAFKA_BROKERS=${{ env.KAFKA_BROKERS }} \
          --env KAFKA_TOPIC=${{ env.KAFKA_TOPIC }} \
          ${{ env.DOCKER_TAG }} \
          make c-demo

    - name: Upload build artifacts
      uses: actions/upload-artifact@v6
      with:
        name: build-dir
        path: build/

    - name: Save build directory to the cache
      if: steps.native-binaries-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v5
      with:
        path: build/
        key: build-dir-${{ github.ref_name }}

  ruby-c-extension:
      runs-on: ubuntu-latest
      needs:
        - compile
      env:
        DOCKER_TAG: libnjkafka-ruby:gha
        RUBY_IMAGE_PATH: /tmp/ruby-image.tar

      steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: build-dir
          path: ./build

      - name: Show artifacts
        run: ls -l build

      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ env.DOCKER_TAG }} \
            --file Dockerfile.ruby \
            .

      - name: Compile the Ruby C extension and run the Ruby tests
        run: |
          docker run --network=host \
            --volume ${{ github.workspace }}:/libnjkafka \
            --env KAFKA_BROKERS=${{ env.KAFKA_BROKERS }} \
            --env KAFKA_TOPIC=${{ env.KAFKA_TOPIC }} \
            ${{ env.DOCKER_TAG }} \
            make ruby-c-ext
