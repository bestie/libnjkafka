name: Build and test

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [ "main" ]

env:
  BROKER_IMAGE_PATH: /tmp/broker-images.tar

jobs:

  compile:
    runs-on: ubuntu-latest
    needs:
      - broker-docker-images
    env:
      DOCKER_TAG: libnjkafka:gha
      KAFKA_TOPIC: kafka-build-topic
      KAFKA_BROKERS: localhost:9092

    services:
      kafka:
        image: confluentinc/cp-kafka:latest
        ports:
          - 9092:9092
        env:
          KAFKA_BROKER_ID: 1
          KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
          KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
          KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
          KAFKA_JMX_PORT: 9101
          KAFKA_DELETE_TOPIC_ENABLE: 'true'

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Reset mtimes
      uses: chetan/git-restore-mtime-action@v2

    - name: Restore the build directory
      uses: actions/cache/restore@v5
      id: native-binaries-cache
      with:
        key: build-dir-${{ github.ref_name }}
        restore-keys: |
          build-dir-main
        path: build/

    - uses: docker/setup-buildx-action@v3

    - uses: docker/build-push-action@v5
      with:
        context: .
        tags: libnjkafka:gha
        load: true
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          ARCHITECTURE=x64

    - name: Build the library
      if: steps.native-binaries-cache.outputs.cache-hit != 'true'
      run: |
        docker run --network=host \
          --platform=linux/amd64 \
          --volume ${{ github.workspace }}:/libnjkafka \
          --env KAFKA_BROKERS=${{ env.KAFKA_BROKERS }} \
          --env KAFKA_TOPIC=${{ env.KAFKA_TOPIC }} \
          ${{ env.DOCKER_TAG }} \
          make

    - name: Run the C test program
      run: |
        docker run --network=host \
          --platform=linux/amd64 \
          --volume ${{ github.workspace }}:/libnjkafka \
          --env KAFKA_BROKERS=${{ env.KAFKA_BROKERS }} \
          --env KAFKA_TOPIC=${{ env.KAFKA_TOPIC }} \
          ${{ env.DOCKER_TAG }} \
          make c-demo

    - name: Upload build artifacts
      uses: actions/upload-artifact@v6
      with:
        name: build-dir
        path: build/

    - name: Save build directory to the cache
      if: steps.native-binaries-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v5
      with:
        path: build/
        key: build-dir-${{ github.ref_name }}

  ruby-c-extension:
      runs-on: ubuntu-latest
      needs:
        - compile
        - broker-docker-images
      env:
        DOCKER_TAG: libnjkafka-ruby:gha
        RUBY_IMAGE_PATH: /tmp/ruby-image.tar

      steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: build-dir
          path: ./build

      - name: Show artifacts
        run: ls -l build

      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ env.DOCKER_TAG }} \
            --file Dockerfile.ruby \
            .

      - name: Compile the Ruby C extension and run the Ruby tests
        run: |
          docker run --network=host \
            --volume ${{ github.workspace }}:/libnjkafka \
            --env KAFKA_BROKERS=${{ env.KAFKA_BROKERS }} \
            --env KAFKA_TOPIC=${{ env.KAFKA_TOPIC }} \
            ${{ env.DOCKER_TAG }} \
            make ruby-c-ext
