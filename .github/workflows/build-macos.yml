name: Build and test

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: macos-latest
    env:
      KAFKA_TOPIC: kafka-build-topic
      KAFKA_BROKERS: localhost:9092
      KAFKA_HOME: "./lib/kafka"

    steps:
    - uses: actions/checkout@v4

    - name: Install Homebrew dependencies
      run: |
        env HOMEBREW_NO_AUTO_UPDATE=1 brew install kafka

    - name: Start the broker
      run: brew services start kafka

    - uses: graalvm/setup-graalvm@v1
      with:
        java-version: "25"
        distribution: "graalvm"
        native-image-job-reports: "true"

    - name: Download Apache Kafka Java library
      run: ./scripts/download_java_libs.sh

    - name: Build the library
      run: make

    - name: Run the demo/test program
      run: make c-demo
