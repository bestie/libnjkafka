name: docker-image-cache/build
description: Cache docker images as tar files

inputs:
  tag:
    description: Docker image tag
    required: true
  key:
    description: Cache key, see actions/cache
    required: false
  path:
    description: Cache path, see actions/cache
    required: false
  platform:
    description: Docker build platform
    required: false
    default: linux/amd64
  file:
    description: Dockerfile path
    required: false
    default: Dockerfile
  build-args:
    description: Docker build args list
    required: false

outputs:
  cache-hit:
    description: If image was present in cache, see actions/cache.
    value: ${{ steps.restore.outputs.cache-hit }}
  path:
    description: Cache path used for the image tar file.
    value: ${{ env.path }}
  key:
    description: Cache key used for the image tar file.
    value: ${{ env.key }}

runs:
  using: composite
  steps:
    - name: Set values
      id: set-values
      shell: bash
      run: |
        default_key="${{ inputs.tag }}-${{ inputs.platform }}-${{ hashFiles(inputs.file) }}"
        echo "default_key=$default_key"
        input_key="${{ inputs.key }}"
        key=${intput_key:-$default_key}

        default_path="/tmp/$key.tar"
        echo "default_path=$default_path"
        input_path="${{ inputs.path }}"
        path=${input_path:-$default_path}

        echo "key=$key"
        echo "path=$path"
        echo "key=$key" >> $GITHUB_STATE
        echo "path=$path" >> $GITHUB_STATE

    - name: Check Docker image cache
      uses: actions/cache@v5
      id: cache-check
      with:
        path: ${{ steps.set-values.outputs.path }}
        key: ${{ steps.set-values.outputs.key }}
        lookup-only: true

    - name: Build Docker image
      shell: bash
      if: steps.cache-check.outputs.cache-hit != 'true'
      run: |
        build_args=""
        if [ -n "${{ inputs.build-args }}" ]; then
          for arg in ${{ inputs.build-args }}; do
            build_args="$build_args --build-arg $arg"
          done
        fi

        docker build \
          --tag ${{ inputs.DOCKER_TAG }} \
          --platform=${{ inputs.platform }} \
          $build_args \
          .
        docker save ${{ inputs.tag }} --output ${{ steps.set-values.outputs.path }}

    - name: Save Docker image to cache
      if: steps.cache-check.outputs.cache-hit != 'true'
      uses: actions/cache@v5
      with:
        path: ${{ steps.set-values.outputs.path }}
        key: ${{ steps.set-values.outputs.key }}
